extraVolumes:
  - name: spiffe-workload-api
    csi:
      driver: csi.spiffe.io
      readOnly: true
  - name: jwt-fetch-script
    configMap:
      name: jwt-fetch-script

extraContainers:
  - name: jwt-fetcher
    image: SPIRE_AGENT_IMAGE
    command: ["python3", "/scripts/server.py"]
    volumeMounts:
      - name: spiffe-workload-api
        mountPath: /spiffe-workload-api
        readOnly: true
      - name: jwt-fetch-script
        mountPath: /scripts
        readOnly: true
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
