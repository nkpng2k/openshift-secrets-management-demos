apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: eso-TEAM_NAMESPACE
spec:
  className: "zero-trust-workload-identity-manager-spire"
  spiffeIDTemplate: "spiffe://TRUST_DOMAIN/eso/TEAM_NAMESPACE"
  podSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: ESO_NAMESPACE
  jwtSVIDTTL: "1h"
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-TEAM_NAMESPACE
spec:
  provider:
    vault:
      server: "http://VAULT_SVC_CLUSTER_IP:8200"
      path: "kv"
      version: "v2"
      auth:
        jwt:
          path: "VAULT_JWT_AUTH_PATH"
          role: "TEAM_NAMESPACE-role"
          secretRef:
            name: "spiffe-jwt"
            key: "jwt-svid.token"
            namespace: "ESO_NAMESPACE"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: team-credentials
  namespace: TEAM_NAMESPACE
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: vault-TEAM_NAMESPACE
    kind: ClusterSecretStore
  target:
    name: team-secret
  data:
    - secretKey: username
      remoteRef:
        key: TEAM_NAMESPACE/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: TEAM_NAMESPACE/credentials
        property: password
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Webhook
metadata:
  name: team-jwt-generator
  namespace: TEAM_NAMESPACE
spec:
  url: "http://localhost:8888/fetch?spiffeID=spiffe://TRUST_DOMAIN/eso/TEAM_NAMESPACE"
  result:
    jsonPath: "$"
  timeout: 5s
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: team-jwt-refresh
  namespace: TEAM_NAMESPACE
spec:
  refreshInterval: "5m"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Webhook
          name: team-jwt-generator
  target:
    name: team-jwt
