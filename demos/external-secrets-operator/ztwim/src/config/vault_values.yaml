global:
  openshift: true
csi:
  enabled: false
  image:
    repository: VAULT_CSI_IMAGE_REPO
    tag: VAULT_CSI_IMAGE_TAG
injector:
  enabled: false
server:
  image:
    repository: VAULT_IMAGE_REPO
    tag: VAULT_IMAGE_TAG
  dev:
    enabled: true
  volumes:
    - name: service-ca
      configMap:
        name: oidc-service-ca
  volumeMounts:
    - name: service-ca
      mountPath: /etc/pki/tls/service-ca
      readOnly: true
