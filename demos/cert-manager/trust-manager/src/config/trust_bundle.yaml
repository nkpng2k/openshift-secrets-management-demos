apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: demo-trust-bundle
spec:
  sources:
    - secret:
        name: intermediate-ca-secret
        key: "tls.crt"
        namespace: "trust-manager-demo-ns"
    - secret:
        name: root-ca-secret
        key: "ca.crt"
        namespace: "trust-manager-demo-ns"
    - useDefaultCAs: true
  target:
    configMap:
      key: "ca-bundle.crt"
    secret:
      key: "ca-bundle.crt"
    namespaceSelector:
      matchLabels:
        trust.cert-manager.io/inject: "true"
